# CI: push/PR마다 타입 검사와 빌드가 통과하는지 자동 확인한다.
# 실패하면 GitHub에 빨간 X가 떠서, 깨진 코드가 배포되기 전에 알 수 있다.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
